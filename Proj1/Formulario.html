<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Formulário</title>
</head>
<body><form className="formulario">

    <label class="titulo">Título:
        <input class="lab" type="text" placeholder="Ex:malabarismo" name="tit"/>
    </label>
    <br>
    <label class="descricao">Descrição:
        <input class="lab" type="text" placeholder="breve explicação" name="des"/>
    </label>
    <br>
    <label class="nome">Nome:
        <input class="lab" type="text" placeholder="Char" name="nome"/>
    </label>
    <br>
    <label class="num">Número:
        <input class="lab" type="number" placeholder="98704" name="num"/>
    </label>
    <br>
    <label class="curso">Curso:
        <input class="lab" type="text" placeholder="LEI" name="curso"/>
    </label>
    <br>
    <label class="tlm">Telemóvel:
        <input class="lab" type="text" placeholder="+351 987632263" name="tlm"/>
    </label>
    <br>
    <label class="email">E-mail:
        <input class="lab" type="email" placeholder="gmcgs@iscte.pt" name="email">
    </label>
    <br>
    <label class="pass">Password:
        <input class="lab" type="password" placeholder="*********" name="password">
    </label>
    <br>
    <label class="nascimento">Data de Nascimento:
        <input class="lab" type="date" name="data">
    </label>
    <br>
    <label class="cor">Cor preferida:
        <input class="lab" type="color" name="color">
    </label>
    <br>
    <label class="link">Link pessoal:
        <input class="lab" type="url" name="link">
    </label>
    <br>
    <form class="range" onsubmit="return false" oninput="level.value = level.valueAsNumber">
        <label for="flying">Flying Skill Level</label>
        <input name="flevel" id="flying" type="range" min="0" max="100" value="0">
        <output for="flying" name="level">0</output>
        /100
    </form>
    <div class="horarios">
        <label class=day for="day">Escolha um Dia:</label>
        <select class=day id="day" name="dia">
            <option value="dia1">10/02/2023</option>
            <option value="dia2">11/02/2023</option>
            <option value="dia3">12/02/2023</option>
        </select>
        <label class=times for="times">Escolha um horário:</label>
        <select class=times id="times" name="horario">
            <option value="horario1">12:00h</option>
            <option value="horario2">15:00h</option>
            <option value="horario3">18:00h</option>
            <option value="horario4">21:00h</option>
        </select>
    </div>
    <nav>
        <input class=b_reg type="submit" value="Registar">
        <input class=b_lim type="reset" value="Limpar">
        <form action="acts.html">
            <input class=b_act type=submit value="Ver atuações já registadas">
        </form>
        <form action="more_info.html">
            <input class="b_info" type=submit value="+info">
        </form>
    </nav>
</form>

</body>
</html>
