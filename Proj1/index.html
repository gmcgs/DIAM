<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="App.css">
    <title>"ISCTE Got Talent"</title>
</head>
<body>
<a href="https://www.iscte-iul.pt/"><img src="images/iscte.png" alt= "logo do iscte" style="width:200px;height:59px;"></a>
<form className="formulario" action="paginaDeProcessamento">

    <label class="titulo">Título:
        <input type="text" placeholder="Ex:malabarismo" name="tit"/>
    </label>
    <br>
    <label class="descricao">Descrição:
        <input type="text" placeholder="breve explicação" name="des"/>
    </label>
    <br>
    <label class="nome">Nome:
        <input type="text" placeholder="Char" name="nome"/>
    </label>
    <br>
    <label class="num">Número:
        <input type="number" placeholder="98704" name="num"/>
    </label>
    <br>
    <label class="tlm">Telemóvel:
        <input type="text" placeholder="+351 987632263" name="tlm"/>
    </label>
    <br>
    <label class="email">E-mail:
        <input type="email" placeholder="gmcgs@iscte.pt" name="email">
    </label>
    <br>

</form>
<form class=horarios action="action_page">
    <label for="times">Escolha um horário:</label>
    <select id="times" name="horario">
        <option value="horario1">Horário 1</option>
        <option value="horario2">Horário 2</option>
        <option value="horario3">Horário 3</option>
        <option value="horario4">Horário 4</option>
    </select>
</form>
<input class=botoes type="submit" onclick="add();" value="Registar">
<input class=botoes type="reset" name="Submit2" value="Limpar">
<br>

<table class=tabela id="output" border="1">
    <tr>
        <th>Título</th>
        <th>Nome</th>
        <th>Horário</th>
        <th>Curso</th>
    </tr>
    <tr>
        <td>Pintar o cabelo</td>
        <td>Ruiva</td>
        <td>horario1</td>
        <td>lei</td>
    </tr>
    <tr>
        <td>Dançar o pipoco</td>
        <td>Mercês</td>
        <td>horario2</td>
        <td>lei</td>
    </tr>
    <tr>
        <td>Jogar Xadrez enquanto canta shakira</td>
        <td>Serrano</td>
        <td>horario3</td>
        <td>lei</td>
    </tr>
    <tr>
        <td>Berrar</td>
        <td>Raquel</td>
        <td>horario4</td>
        <td>sociologia</td>
    </tr>
</table>

<div class=links>
    <p><a href="https://www.instagram.com/aeiscte/">AEISCTE</a><a href="https://www.instagram.com/taiscte/">TAISCTE</a><a href="https://www.instagram.com/miscutem/">MISCUTEM</a></p>
</div>
</body>
</html>
