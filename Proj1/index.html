<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="App.css">
    <title>"ISCTE Got Talent"</title>
</head>
<body>
<header>
    <a href="https://www.iscte-iul.pt/"><img src="images/iscte.png" alt= "logo do iscte" style="width:200px;height:59px;"></a>
</header>
<form className="formulario" action="paginaDeProcessamento">

    <label class="titulo">Título:
        <input type="text" placeholder="Ex:malabarismo" name="tit"/>
    </label>
    <br>
    <label class="descricao">Descrição:
        <input type="text" placeholder="breve explicação" name="des"/>
    </label>
    <br>
    <label class="nome">Nome:
        <input type="text" placeholder="Char" name="nome"/>
    </label>
    <br>
    <label class="num">Número:
        <input type="number" placeholder="98704" name="num"/>
    </label>
    <br>
    <label class="curso">Curso:
        <input type="text" placeholder="LEI" name="curso"/>
    </label>
    <br>
    <label class="tlm">Telemóvel:
        <input type="text" placeholder="+351 987632263" name="tlm"/>
    </label>
    <br>
    <label class="email">E-mail:
        <input type="email" placeholder="gmcgs@iscte.pt" name="email">
    </label>
    <br>

</form>
<form class=horarios action="action_page">
    <label for="times">Escolha um horário:</label>
    <select id="times" name="horario">
        <option value="horario1">12:00h</option>
        <option value="horario2">15:00h</option>
        <option value="horario3">18:00h</option>
        <option value="horario4">21:00h</option>
    </select>
</form>
<div class="bot">
    <input class=b_reg type="submit" onclick="add();" value="Registar">
    <input class=b_lim type="reset" name="Submit2" value="Limpar">
    <form action=more_info.html>
        <input class="b_info" type=submit value="+info">
    </form>
</div>
<br>
<footer >
    <div class="fundo">
        <div class=linksheader>
            <h3>Links associados</h3>
            <a class=links href="https://www.instagram.com/aeiscte/">AEISCTE</a><br>
            <a class=links href="https://www.instagram.com/taiscte/">TAISCTE</a><br>
            <a class=links href="https://www.instagram.com/miscutem/">MISCUTEM</a>
        </div>
        <div class=contactosheader>
            <h3>Contactos</h3>
        </div>
    </div>

</footer>
</body>
</html>
